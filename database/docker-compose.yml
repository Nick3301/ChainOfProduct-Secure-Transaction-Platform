services:
  postgres:
    image: postgres:16
    container_name: sirs_postgres
    environment:
      POSTGRES_USER: sirs
      POSTGRES_PASSWORD: sirs
      POSTGRES_DB: sirsdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf
      - ../certs/db_server.crt:/var/lib/postgresql/server.crt:ro
      - ../certs/db_server.key:/var/lib/postgresql/server.key:ro
      - ../certs/root.crt:/var/lib/postgresql/root.crt:ro
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/server.crt
      -c ssl_key_file=/var/lib/postgresql/server.key
      -c ssl_ca_file=/var/lib/postgresql/root.crt
      -c hba_file=/etc/postgresql/pg_hba.conf
volumes:
  pgdata: